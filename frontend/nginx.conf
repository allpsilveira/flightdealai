# Nginx config for the production React build container
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression (~70% reduction on text assets) ───────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── API proxy (no cache) ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://flightdeal-ai_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── WebSocket proxy ────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass          http://flightdeal-ai_backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
    }

    # ── Static assets: long cache, immutable (hashed filenames) ────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SPA fallback: short cache, revalidate ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
}
